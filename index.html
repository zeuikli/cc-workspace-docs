<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>Zeuik's Claude Code Docs</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
  <!-- Google Fonts — same as walkinglabs -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">
  <style>
    /* ── Design tokens — walkinglabs-exact palette ── */
    :root {
      --brand:        #D95C41;
      --brand-hover:  #C14E36;
      --brand-deep:   #A8412B;
      --brand-soft:   rgba(217, 92, 65, 0.1);
      --brand-border: rgba(217, 92, 65, 0.25);

      --bg:           #FAF9F5;
      --bg-alt:       #F4F3EE;
      --bg-elv:       #FFFFFF;

      --text-1:       #1A1A1A;
      --text-2:       #4A4A4A;
      --text-3:       #757575;
      --divider:      rgba(0,0,0,0.08);

      --sidebar-bg:   #F4F3EE;
      --sidebar-w:    272px;

      --radius:       10px;
      --base-font-size: 16px;
      --base-line-height: 1.75;

      /* ── Type scale (8 steps) ── */
      --fs-2xs:  0.70rem;   /* 11.2px — badges, labels */
      --fs-xs:   0.75rem;   /* 12px   — metadata, sub-labels */
      --fs-sm:   0.825rem;  /* 13.2px — sidebar links, search, table cells */
      --fs-base: 1rem;      /* 16px   — body text */
      --fs-md:   1.0625rem; /* 17px   — h4 */
      --fs-lg:   1.15rem;   /* 18.4px — h3, logo */
      --fs-xl:   1.6rem;    /* 25.6px — h2, hero title */
      --fs-2xl:  2.4rem;    /* 38.4px — h1 */
      --fs-stat: 1.5rem;    /* 24px   — stats numbers */
    }

    /* ── Base typography — Inter + Newsreader ── */
    html, body {
      font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text-1);
    }

    /* ── Sidebar ── */
    .sidebar {
      background: var(--sidebar-bg) !important;
      border-right: 1px solid var(--divider) !important;
      width: var(--sidebar-w) !important;
    }
    .sidebar .app-name-link {
      font-family: 'Newsreader', ui-serif, Georgia, serif;
      color: var(--text-1) !important;
      font-weight: 500;
      font-size: var(--fs-lg);
      letter-spacing: -.01em;
    }
    .sidebar ul li a {
      color: var(--text-2) !important;
      font-size: var(--fs-sm);
      line-height: 1.55;
      border-radius: 6px;
      padding: .25rem .5rem;
      transition: color .15s, background .15s;
    }
    .sidebar ul li a:hover {
      color: var(--text-1) !important;
      background: rgba(0,0,0,.04);
    }
    .sidebar ul li.active > a {
      color: var(--text-1) !important;
      font-weight: 600;
      background: rgba(0,0,0,.06);
    }
    /* sub-items */
    .sidebar ul ul { padding-left: .9rem; }
    .sidebar ul ul li a { font-size: var(--fs-xs); color: var(--text-3) !important; }
    .sidebar ul ul li a:hover { color: var(--text-1) !important; }
    .sidebar ul ul li.active > a { color: var(--text-1) !important; font-weight: 600; }
    /* section bold labels */
    .sidebar ul > li > p > strong,
    .sidebar ul > li > strong {
      font-size: var(--fs-2xs);
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--text-3) !important;
      display: block;
      margin: 1rem 0 .25rem;
      font-weight: 600;
    }
    .sidebar-toggle { background: var(--sidebar-bg) !important; }
    .sidebar-toggle span { background: var(--text-3) !important; }

    /* ── Search ── */
    .sidebar .search {
      padding: .6rem .75rem !important;
      border-bottom: 1px solid var(--divider) !important;
      background: var(--sidebar-bg);
    }
    .search input,
    .search input[type="search"] {
      background: var(--bg-elv) !important;
      color: var(--text-1) !important;
      border: 1px solid var(--divider) !important;
      border-radius: 6px !important;
      padding: .4rem .7rem !important;
      font-size: var(--fs-sm) !important;
      font-family: inherit !important;
      width: 100% !important;
      box-sizing: border-box !important;
      outline: none !important;
      box-shadow: none !important;
      caret-color: var(--brand) !important;
    }
    .search input:focus {
      border-color: var(--brand) !important;
      box-shadow: 0 0 0 2px var(--brand-soft) !important;
    }
    .search input::placeholder { color: var(--text-3) !important; }
    .search .clear-button { color: var(--text-3) !important; }
    .search .clear-button:hover { color: var(--brand) !important; }
    .search .results-panel {
      background: var(--bg-elv) !important;
      border: 1px solid var(--divider) !important;
      border-radius: 0 0 8px 8px !important;
      box-shadow: 0 8px 24px rgba(0,0,0,.1) !important;
    }
    .search .results-panel .matching-post {
      border-bottom: 1px solid var(--divider) !important;
      padding: .6rem .8rem !important;
    }
    .search .results-panel .matching-post:last-child { border-bottom: none !important; }
    .search .results-panel .matching-post a { color: var(--text-1) !important; font-size: var(--fs-sm) !important; font-weight: 600; }
    .search .results-panel .matching-post a:hover { color: var(--brand) !important; }
    .search .results-panel .matching-post p { color: var(--text-3) !important; font-size: var(--fs-xs) !important; margin: .2rem 0 0 !important; }

    /* ── Main content ── */
    .content { padding: 2rem 3rem !important; max-width: 900px; }
    body { background: var(--bg); }

    /* ── Headings — Newsreader for h1/h2 ── */
    h1 {
      font-family: 'Newsreader', ui-serif, Georgia, serif;
      font-size: var(--fs-2xl);
      font-weight: 400;
      color: var(--text-1);
      line-height: 1.15;
      letter-spacing: -.02em;
      border-bottom: 1px solid var(--divider);
      padding-bottom: .6rem;
      margin-bottom: 1.2rem;
    }
    h2 {
      font-family: 'Newsreader', ui-serif, Georgia, serif;
      font-size: var(--fs-xl);
      font-weight: 400;
      color: var(--text-1);
      line-height: 1.2;
      letter-spacing: -.01em;
      margin-top: 2.5rem;
      padding-bottom: .4rem;
      border-bottom: 1px solid var(--divider);
    }
    h3 { font-size: var(--fs-lg); font-weight: 600; color: var(--text-1); margin-top: 2rem; }
    h4 { font-size: var(--fs-md); font-weight: 600; color: var(--text-2); }

    /* ── Body text ── */
    p { line-height: 1.8; color: var(--text-2); }
    p + p { margin-top: .5rem; }
    p { word-break: break-word; overflow-wrap: break-word; }

    /* ── Links ── */
    a { color: var(--brand); text-decoration: none; transition: color .2s; }
    a:hover { color: var(--brand-hover); text-decoration: underline; }

    /* ── Lists ── */
    ul li, ol li { margin: 6px 0; line-height: 1.75; color: var(--text-2); }
    ul li::marker { color: var(--brand); }
    ul { padding-left: 1.25rem; }

    /* ── Inline code ── */
    code {
      font-family: 'JetBrains Mono', 'Fira Code', ui-monospace, monospace;
      background: var(--bg-alt);
      color: var(--text-1);
      border: 1px solid var(--divider);
      border-radius: 5px;
      padding: .15em .4em;
      font-size: 0.875em;
    }
    /* ── Code blocks ── */
    pre {
      background: var(--bg-elv) !important;
      border: 1px solid var(--divider) !important;
      border-radius: var(--radius) !important;
    }
    pre code {
      color: var(--text-1) !important;
      font-size: var(--fs-sm) !important;
      background: none !important;
      border: none !important;
      padding: 0 !important;
    }

    /* ── Tables ── */
    table { border-collapse: collapse; width: 100%; margin: 1.2rem 0; border-radius: 8px; overflow: hidden; }
    th {
      background: var(--brand-soft);
      font-weight: 600;
      text-align: left;
      padding: .6rem 1rem;
      border: 1px solid var(--divider);
      font-size: var(--fs-sm);
      color: var(--text-1);
    }
    td { padding: .55rem 1rem; border: 1px solid var(--divider); font-size: var(--fs-sm); color: var(--text-2); }
    tr:hover td { background: var(--bg-alt); }

    /* ── Blockquotes ── */
    blockquote {
      border-left: 4px solid var(--brand);
      background: var(--brand-soft);
      border-radius: 0 8px 8px 0;
      padding: .75rem 1.1rem;
      margin: 1.2rem 0;
      font-style: normal;
    }
    blockquote p { margin: 0; font-size: var(--fs-base); color: var(--text-2); }

    /* ── HR ── */
    hr { border: none; border-top: 1px solid var(--divider); margin: 2rem 0; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-thumb { background: var(--brand-soft); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--brand); }

    /* ── Hero banner ── */
    .hero-banner {
      background: linear-gradient(135deg, #fff8f5 0%, #fdeee8 60%, #faf9f5 100%);
      border: 1px solid var(--brand-border);
      border-radius: var(--radius);
      padding: 2.2rem 2rem;
      margin-bottom: 2rem;
    }
    .hero-banner h1 {
      font-family: 'Newsreader', ui-serif, Georgia, serif;
      font-size: var(--fs-xl);
      font-weight: 400;
      border: none !important;
      padding: 0;
      margin: 0 0 .5rem;
      letter-spacing: -.02em;
    }
    .hero-banner p { color: var(--text-3); margin: 0; font-size: var(--fs-base); }
    .hero-badge {
      display: inline-block;
      background: var(--brand);
      color: #fff;
      font-size: var(--fs-2xs);
      font-weight: 600;
      padding: .15rem .6rem;
      border-radius: 20px;
      margin-bottom: .75rem;
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    /* ── Stats bar ── */
    .stats-bar {
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
      background: var(--bg-alt);
      border: 1px solid var(--divider);
      border-radius: var(--radius);
      padding: 1rem 1.5rem;
      margin-bottom: 1.8rem;
    }
    .stat { text-align: center; min-width: 60px; }
    .stat-num { font-size: var(--fs-stat); font-weight: 700; color: var(--brand); line-height: 1; font-family: 'Newsreader', serif; }
    .stat-label { font-size: var(--fs-2xs); color: var(--text-3); margin-top: .25rem; text-transform: uppercase; letter-spacing: .07em; font-weight: 500; }

    /* ── Card grid ── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1rem;
      margin: 1.2rem 0 2rem;
    }
    .card {
      border: 1px solid var(--divider);
      border-radius: 12px;
      padding: 1.2rem;
      background: var(--bg-elv);
      transition: border-color .2s, box-shadow .2s, transform .2s;
    }
    .card:hover {
      border-color: var(--brand);
      box-shadow: 0 4px 12px rgba(0,0,0,.05);
      transform: translateY(-1px);
    }
    .card-icon { font-size: 1.4rem; margin-bottom: .4rem; }
    .card-title { font-weight: 600; color: var(--text-1); font-size: var(--fs-base); margin-bottom: .25rem; }
    .card-title a { color: inherit !important; text-decoration: none !important; }
    .card-title a:hover { color: var(--brand) !important; }
    .card-desc { color: var(--text-3); font-size: var(--fs-sm); line-height: 1.5; }
    .card-count { display: inline-block; margin-top: .5rem; font-size: var(--fs-xs); color: var(--brand); font-weight: 600; }

    /* ── Pagination ── */
    .docsify-pagination-container { border-top: 1px solid var(--divider); margin-top: 2.5rem; padding-top: 1rem; }
    .pagination-item--next a, .pagination-item--previous a { color: var(--brand) !important; }

    /* ── Sidebar collapse ── */
    /* 折疊箭頭 */
    .sidebar-nav .collapse-title::after,
    .sidebar ul li .sidebar-collapse-toggle::after {
      content: '›';
      font-size: 1.1rem;
      color: var(--text-3);
      float: right;
      transition: transform .2s;
    }
    .sidebar ul li.open .sidebar-collapse-toggle::after,
    .sidebar ul li.active .sidebar-collapse-toggle::after {
      transform: rotate(90deg);
    }
    /* 折疊狀態下子項隱藏 */
    .sidebar ul li:not(.open) > ul { display: none; }

    /* ── Transcript 逐字稿 ── */

    /* Container wrapping everything after ## 完整逐字稿 */
    .transcript-body {
      background: var(--bg-elv);
      border: 1px solid var(--divider);
      border-radius: var(--radius);
      padding: 1.75rem 2rem;
      margin-top: 1.2rem;
      max-width: 700px;          /* comfortable reading column */
    }

    /* Body text inside transcript */
    .transcript-body p {
      font-size: var(--fs-base);
      line-height: 2;
      color: var(--text-2);
      margin: 0 0 1em;
      word-break: break-word;
    }

    /* Speaker labels: lines ending in "?" or starting with caps word + colon */
    .transcript-speaker {
      font-weight: 600;
      color: var(--text-1);
      font-size: var(--fs-sm);
      text-transform: uppercase;
      letter-spacing: .05em;
      margin: 1.4em 0 .2em;
      display: block;
    }

    /* Legacy timestamp badges (kept for files that do have them) */
    .ts-badge {
      display: inline-block;
      background: var(--bg-alt);
      color: var(--text-3) !important;
      font-size: var(--fs-2xs);
      font-family: 'JetBrains Mono', monospace;
      padding: .1rem .45rem;
      border-radius: 4px;
      margin-right: .5rem;
      font-weight: 500;
      vertical-align: middle;
      white-space: nowrap;
      border: 1px solid var(--divider);
    }

    /* Notice banner inside transcript */
    .transcript-notice {
      background: var(--brand-soft);
      border-left: 3px solid var(--brand);
      border-radius: 0 6px 6px 0;
      padding: .5rem .9rem;
      margin-bottom: 1.4rem;
      font-size: var(--fs-sm);
      color: var(--text-2);
    }

    /* ── Mobile ── */
    @media (max-width: 768px) {
      .content { padding: 1.2rem !important; }
      .cards-grid { grid-template-columns: 1fr 1fr; }
      .stats-bar { gap: 1rem; }
      h1 { font-size: var(--fs-xl) !important; }
      h2 { font-size: var(--fs-lg) !important; }
      h3 { font-size: var(--fs-base) !important; }
      .markdown-section table { display: block; overflow-x: auto; -webkit-overflow-scrolling: touch; }
      /* Transcript on mobile */
      .transcript-body { padding: 1.1rem 1rem; border-radius: 8px; max-width: 100%; }
      .transcript-body p { font-size: var(--fs-base); line-height: 1.9; }
    }
    @media (max-width: 480px) {
      .cards-grid { grid-template-columns: 1fr; }
      .stats-bar { flex-direction: column; gap: .8rem; align-items: flex-start; }
      .stat { display: flex; align-items: baseline; gap: .5rem; }
      .stat-label { margin-top: 0; }
    }
  </style>
</head>
<body>
  <div id="app">載入中...</div>
  <script>
    window.$docsify = {
      name: "Zeuik's Claude Code Docs",
      nameLink: '/',
      repo: 'https://github.com/zeuikli/cc-workspace-docs',
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,
      relativePath: true,

      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: '搜尋文章...',
        noData: '找不到結果',
        depth: 4,
        hideOtherSidebarContent: false
      },

      pagination: {
        previousText: '← 上一篇',
        nextText: '下一篇 →',
        crossChapter: true,
        crossChapterText: true
      },

      alias: {
        '/.*/_sidebar.md': '/_sidebar.md'
      },

      plugins: [
        function(hook) {
          hook.doneEach(function() {
            var section = document.querySelector('.markdown-section');
            if (!section) return;

            // Find the "完整逐字稿" heading (h2 or h3)
            var headings = section.querySelectorAll('h2, h3');
            var transcriptHeading = null;
            headings.forEach(function(h) {
              if (/完整逐字稿/.test(h.textContent)) transcriptHeading = h;
            });
            if (!transcriptHeading) return;

            // Collect all sibling nodes after the heading
            var nodes = [];
            var node = transcriptHeading.nextElementSibling;
            while (node) {
              nodes.push(node);
              node = node.nextElementSibling;
            }
            if (!nodes.length) return;

            // Wrap them in .transcript-body
            var wrapper = document.createElement('div');
            wrapper.className = 'transcript-body';

            // Move notice blockquote first (⚠ warning), then rest
            nodes.forEach(function(n) {
              // Style blockquote notices
              if (n.tagName === 'BLOCKQUOTE') {
                n.className = 'transcript-notice';
              }
              // Timestamp badges (legacy)
              if (n.tagName === 'P') {
                n.querySelectorAll('strong').forEach(function(el) {
                  if (/^\[[\d:]+\s*[→→]\s*[\d:]+\]$/.test(el.textContent.trim())) {
                    el.classList.add('ts-badge');
                  }
                });
              }
              wrapper.appendChild(n);
            });

            transcriptHeading.insertAdjacentElement('afterend', wrapper);
          });
        }
      ]
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/docsify-sidebar-collapse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/zoom-image.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-yaml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
</body>
</html>
